{% extends "base.html" %}
{% block content %}
<div style="max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px;">
    <h2>📝 Submit New Grievance</h2>
    <form method="POST">
        <div class="form-group mb-3">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-control" required placeholder="e.g., Incorrect exam marks">
        </div>

        <div style="display: flex; gap: 20px;" class="mb-3">
            <div class="form-group" style="flex: 1;">
                <label class="form-label">Category</label>
                <select name="category" class="form-select" required>
                    <option value="academic">Academic</option>
                    <option value="administrative">Administrative</option>
                    <option value="hostel">Hostel</option>
                    <option value="examination">Examination</option>
                </select>
            </div>
            <div class="form-group" style="flex: 1;">
                <label class="form-label">Priority</label>
                <select name="priority" class="form-select" required>
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
        </div>

        <!-- FIXED anonymous checkbox alignment -->
        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="anonymous" name="anonymous" value="1">
            <label class="form-check-label" for="anonymous">
                Submit Anonymously
            </label>
        </div>

        <div class="form-group mb-4">
            <label class="form-label">Description</label>
            <textarea name="description" rows="8" class="form-control" required placeholder="Detailed description..."></textarea>
        </div>

        <button type="submit" class="btn btn-success w-100">Submit Grievance</button>
    </form>
</div>
{% endblock %}
