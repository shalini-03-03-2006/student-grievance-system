{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 50px auto; background: white; padding: 40px; border-radius: 15px;">
    <h2 style="text-align: center;">👨‍💼 Admin Login</h2>
    <form method="POST">
        <div class="form-group">
            <label>Admin Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-danger" style="width: 100%;">Admin Login</button>
    </form>
</div>
{% endblock %}
