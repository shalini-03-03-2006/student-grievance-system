{% extends "base.html" %}
{% block content %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">Feedback for Grievance #{{ grievance_id }}</h5>
        </div>

        <div class="card-body">
          <div class="mb-3">
            <p class="mb-1"><strong>Title:</strong> {{ title }}</p>
            <p class="mb-1">
              <strong>Status:</strong>
              <span class="badge 
                {% if status == 'resolved' %}
                  bg-success
                {% elif status == 'closed' %}
                  bg-secondary
                {% else %}
                  bg-warning text-dark
                {% endif %}
              ">
                {{ status|capitalize }}
              </span>
            </p>
          </div>

          <hr>

          <form method="post">
            <div class="mb-3">
              <label for="feedback" class="form-label">Your Feedback</label>
              <textarea
                id="feedback"
                name="feedback"
                class="form-control"
                rows="5"
                placeholder="Describe your experience with the resolution and any suggestions for improvement."
              >{{ feedback or '' }}</textarea>
              <div class="form-text">
                Please give clear and honest feedback.
              </div>
            </div>

            <div class="d-flex justify-content-between">
              <a href="{{ url_for('student_dashboard') }}" class="btn btn-outline-secondary">
                Back
              </a>
              <button type="submit" class="btn btn-primary">
                Submit Feedback
              </button>
            </div>
          </form>
        </div>

        <div class="card-footer text-muted small text-center">
          Thank you for helping us improve our grievance system.
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
