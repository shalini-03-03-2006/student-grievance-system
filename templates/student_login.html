{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 50px auto; background: white; padding: 40px; border-radius: 15px;">
    <h2 style="text-align: center;">👨‍🎓 Student Login</h2>
    <form method="POST">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-success" style="width: 100%;">Login</button>
    </form>
    <p style="text-align: center; margin-top: 20px;">
        <a href="{{ url_for('student_register') }}">New Student? Register Here</a>
    </p>
</div>
{% endblock %}
